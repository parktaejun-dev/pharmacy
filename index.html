<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Load pre-built OpenCV early and dispatch event when ready -->
    <script src="/opencv/opencv.js" async onload="if(typeof cv !== 'undefined' && cv.onRuntimeInitialized === undefined) { cv.onRuntimeInitialized = () => { window.dispatchEvent(new Event('opencv-ready')); }; }"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
