<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite + React + TS</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // Global polling fallback to check when OpenCV is ready
    var cvCheckInterval = setInterval(function () {
      if (typeof cv !== 'undefined' && cv.Mat) {
        clearInterval(cvCheckInterval);
        window.dispatchEvent(new Event('opencv-ready'));
      }
    }, 100);

    var Module = {
      onRuntimeInitialized: function () {
        if (cvCheckInterval) clearInterval(cvCheckInterval);
        window.dispatchEvent(new Event('opencv-ready'));
      }
    };
  </script>
  <script src="/opencv/opencv.js" async></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
